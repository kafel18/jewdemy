<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewdemy — Cursos online</title>
<style>
  :root{
    --ink:#1c1d1f; --muted:#6a6f73; --line:#d1d7dc; --purple:#5624d0;
    --purple-dark:#401b9c; --amber:#e59819; --bg:#fff; --soft:#f7f9fa; --green:#1e7a46; --red:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.4}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  input,textarea,select{font-family:inherit;font-size:14px}

  header{display:flex;align-items:center;gap:14px;padding:10px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:50;flex-wrap:wrap}
  .logo{cursor:pointer;display:flex;align-items:center}
  .logo img{height:112px;width:auto;display:block}
  .search{flex:1;display:flex;align-items:center;border:1px solid var(--ink);border-radius:999px;background:var(--soft);padding:8px 18px;gap:10px;min-width:120px}
  .search input{border:none;background:transparent;outline:none;flex:1;font-size:15px;color:var(--ink)}
  .search input::placeholder{color:var(--muted)}
  .search svg{width:18px;height:18px;fill:var(--ink)}
  .nav-link{font-size:14px;font-weight:600;color:var(--ink);background:none;white-space:nowrap}
  .nav-link:hover{color:var(--purple)}
  .icon-btn{background:transparent;position:relative;padding:6px}
  .icon-btn svg{width:24px;height:24px;fill:var(--ink)}
  .badge{position:absolute;top:-2px;right:-4px;background:var(--purple);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--purple);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .menu{position:absolute;right:24px;top:64px;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.15);width:230px;z-index:80;overflow:hidden}
  .menu button{display:block;width:100%;text-align:left;padding:12px 16px;background:none;font-size:14px}
  .menu button:hover{background:var(--soft)}
  .menu .sep{border-top:1px solid var(--line)}
  .lang-sel{background:none;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;font-weight:600;cursor:pointer}

  .cats{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid var(--line);overflow-x:auto;align-items:center}
  .cats button{background:transparent;padding:8px 14px;border-radius:6px;font-size:14px;color:var(--muted);white-space:nowrap;font-weight:600}
  .cats button.active{color:var(--purple);background:#f0ebff}

  .filters{display:flex;gap:12px;padding:12px 24px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line)}
  .filters label{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px}
  .filters select{padding:8px 10px;border:1px solid var(--line);border-radius:6px}

  .hero{margin:24px;padding:48px;border-radius:8px;background:linear-gradient(120deg,#2d2f31,#5624d0);color:#fff}
  .hero h1{font-size:36px;max-width:560px;margin-bottom:12px}
  .hero p{font-size:17px;opacity:.9;max-width:480px}

  main{padding:0 24px 60px}
  .section-title{font-size:24px;font-weight:800;margin:24px 0 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
  .card{cursor:pointer;position:relative}
  .thumb{width:100%;aspect-ratio:16/9;border-radius:4px;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:#fff;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .card h3{font-size:16px;font-weight:700;margin:8px 0 2px}
  .card .author{font-size:12px;color:var(--muted)}
  .tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#eceaf6;color:var(--purple-dark)}
  .tag.lvl{background:#e6f4ec;color:var(--green)}
  .tag.lang{background:#fdf0e3;color:#b4690e}
  .price{font-weight:800;font-size:16px;margin-top:6px}
  .price s{color:var(--muted);font-weight:400;margin-left:6px;font-size:14px}
  .heart{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2}
  .heart.on{color:var(--red)}

  .detail-head{background:#1c1d1f;color:#fff;padding:40px 24px}
  .detail-head .inner{display:flex;gap:40px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
  .detail-info{flex:1;min-width:280px}
  .detail-info h1{font-size:30px;margin-bottom:12px}
  .detail-info p.sub{font-size:18px;opacity:.9;margin-bottom:12px}
  .detail-info .meta{font-size:13px;opacity:.8;margin-bottom:4px}
  .buy-box{width:320px;background:#fff;color:var(--ink);border-radius:4px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.2);align-self:flex-start}
  .buy-box .price{font-size:28px;margin:0 0 16px}
  .buy-box button{width:100%;padding:14px;font-size:16px;font-weight:700;border-radius:4px;margin-bottom:10px}
  .btn-cart{background:var(--purple);color:#fff}
  .btn-cart:hover{background:var(--purple-dark)}
  .btn-buy{background:#fff;color:var(--ink);border:1px solid var(--ink)!important}
  .detail-body{max-width:1100px;margin:32px auto;padding:0 24px}
  .detail-body h2{font-size:22px;margin:28px 0 14px}
  .learn-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;border:1px solid var(--line);padding:24px;border-radius:4px}
  .learn-list li{list-style:none;padding-left:26px;position:relative;font-size:14px}
  .learn-list li::before{content:"\2713";position:absolute;left:0}
  .curr-item{border:1px solid var(--line);padding:12px 16px;font-size:14px}
  .curr-item:not(:last-child){border-bottom:none}
  .curr-item .ttl{display:flex;justify-content:space-between;align-items:center}
  .curr-item .res{font-size:12px;color:var(--purple);margin-top:6px}

  .back{color:var(--purple);font-weight:700;cursor:pointer;display:inline-block;margin:20px 24px 0}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60}
  .drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:90vw;background:#fff;z-index:70;box-shadow:-4px 0 20px rgba(0,0,0,.15);display:flex;flex-direction:column}
  .drawer header{border-bottom:1px solid var(--line);justify-content:space-between}
  .drawer .items{flex:1;overflow-y:auto;padding:16px}
  .cart-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .mini{width:60px;height:44px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .cart-row .info{flex:1}
  .cart-row .info h4{font-size:14px}
  .cart-row .info .author{font-size:12px;color:var(--muted)}
  .remove{color:var(--purple);font-size:12px;background:none}
  .drawer .foot{padding:16px;border-top:1px solid var(--line)}
  .drawer .total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;margin-bottom:12px}
  .drawer .foot button{width:100%;padding:14px;background:var(--purple);color:#fff;font-weight:700;border-radius:4px;font-size:16px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .close-x{background:none;font-size:22px}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:#fff;border-radius:8px;width:440px;max-width:100%;padding:32px;position:relative;max-height:92vh;overflow-y:auto}
  .modal-box h2{font-size:22px;margin-bottom:20px;text-align:center}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
  .field input,.field textarea,.field select{width:100%;padding:11px;border:1px solid var(--ink);border-radius:4px;outline:none}
  .field .hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
  .modal-box .submit{width:100%;padding:13px;background:var(--purple);color:#fff;font-weight:700;border-radius:4px;font-size:15px;margin-top:6px}
  .switch{text-align:center;margin-top:14px;font-size:13px;color:var(--muted)}
  .switch b{color:var(--purple);cursor:pointer}
  .role-pick{display:flex;gap:8px;margin-bottom:14px}
  .role-pick button{flex:1;padding:10px;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:600;font-size:13px}
  .role-pick button.sel{border-color:var(--purple);background:#f0ebff;color:var(--purple)}
  .yesno{display:flex;gap:8px}
  .yesno button{flex:1;padding:10px;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:600}
  .yesno button.sel{border-color:var(--purple);background:#f0ebff;color:var(--purple)}
  .gbtn{width:100%;padding:12px;border:1px solid var(--line);border-radius:4px;background:#fff;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
  .gbtn:hover{background:var(--soft)}
  .divider{text-align:center;color:var(--muted);font-size:12px;margin:14px 0;position:relative}

  .player{display:flex;min-height:calc(100vh - 80px)}
  .player-main{flex:1;background:#000}
  .video{aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:12px}
  .video video{width:100%;height:100%}
  .video .big{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:30px}
  .player-meta{background:#fff;padding:20px 24px}
  .res-box{background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:14px;margin-top:14px}
  .res-box a{display:inline-flex;align-items:center;gap:6px;color:var(--purple);font-weight:600;font-size:14px;margin-right:16px}
  .sidebar{width:340px;border-left:1px solid var(--line);background:#fff;max-height:calc(100vh - 80px);overflow-y:auto}
  .sidebar h3{padding:16px;border-bottom:1px solid var(--line);font-size:16px}
  .lesson{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;cursor:pointer;font-size:14px}
  .lesson:hover{background:var(--soft)}
  .lesson.active{background:#f0ebff}
  .lesson .chk{width:18px;height:18px;border:1px solid var(--muted);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
  .lesson .chk.done{background:var(--green);border-color:var(--green);color:#fff}
  .progress-bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:8px 0}
  .progress-bar i{display:block;height:100%;background:var(--green)}

  .panel{max-width:860px;margin:30px auto;padding:0 24px}
  .panel h1{font-size:28px;margin-bottom:20px}
  .form-card{border:1px solid var(--line);border-radius:8px;padding:24px;margin-bottom:20px}
  .btn-primary{background:var(--purple);color:#fff;font-weight:700;padding:12px 22px;border-radius:4px;font-size:15px}
  .btn-ghost{background:#fff;color:var(--purple);border:1px solid var(--purple);font-weight:700;padding:10px 18px;border-radius:4px;font-size:14px}
  .btn-danger{background:var(--red);color:#fff;font-weight:700;padding:8px 14px;border-radius:4px;font-size:13px}
  .lesson-edit{border:1px solid var(--line);border-radius:6px;padding:14px;margin-bottom:10px;background:var(--soft)}
  .lesson-edit .row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .lesson-edit input{flex:1}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:6px;z-index:100;font-size:14px}

  table.admin{width:100%;border-collapse:collapse;font-size:14px}
  table.admin th,table.admin td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}
  table.admin th{color:var(--muted);font-size:12px;text-transform:uppercase}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .pill.active{background:#e6f4ec;color:var(--green)}
  .pill.blocked{background:#fdeaea;color:var(--red)}
  .tabbar{display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}
  .tabbar button{background:none;padding:10px 16px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent}
  .tabbar button.on{color:var(--purple);border-bottom-color:var(--purple)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#f0ebff;color:var(--purple-dark);padding:6px 12px;border-radius:999px;margin:4px;font-weight:600;font-size:13px}
  .chip button{background:none;color:var(--purple-dark);font-weight:800}

  .msg-wrap{display:flex;max-width:1000px;margin:24px auto;border:1px solid var(--line);border-radius:8px;overflow:hidden;min-height:520px}
  .msg-list{width:300px;border-right:1px solid var(--line);overflow-y:auto}
  .msg-list .thread{padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .msg-list .thread:hover,.msg-list .thread.on{background:var(--soft)}
  .msg-list .thread h4{font-size:14px}
  .msg-list .thread p{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-panel{flex:1;display:flex;flex-direction:column}
  .msg-head{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700}
  .msg-body{flex:1;padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:var(--soft)}
  .bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:14px}
  .bubble.me{align-self:flex-end;background:var(--purple);color:#fff;border-bottom-right-radius:4px}
  .bubble.them{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
  .msg-input input{flex:1;padding:11px;border:1px solid var(--line);border-radius:999px}
  .msg-input button{background:var(--purple);color:#fff;padding:0 20px;border-radius:999px;font-weight:700}

  /* video menor + overlay próxima aula */
  .video{position:relative;max-width:720px;margin:0 auto}
  .next-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;text-align:center;padding:20px}
  .next-overlay h3{font-size:20px}
  .next-overlay .count{font-size:14px;opacity:.85}
  .next-overlay .row{display:flex;gap:10px;margin-top:6px}
  .next-overlay button{padding:10px 18px;border-radius:4px;font-weight:700}
  .next-overlay .go{background:var(--purple);color:#fff}
  .next-overlay .cancel{background:transparent;color:#fff;border:1px solid #fff}
  /* seções + recursos na lateral */
  .sec-head{padding:12px 16px;background:#efeff1;font-weight:800;font-size:13px;border-bottom:1px solid var(--line)}
  .lesson-res{padding:0 16px 10px 44px;border-bottom:1px solid var(--line);background:#fff}
  .lesson-res a{display:flex;align-items:center;gap:6px;color:var(--purple);font-weight:600;font-size:13px;padding:3px 0}
  /* footer estilo udemy */
  footer.site{background:#2d2f31;color:#fff;padding:46px 24px}
  .foot-cols{display:flex;flex-wrap:wrap;gap:48px;max-width:1100px;margin:0 auto}
  .foot-col h4{font-size:15px;margin-bottom:12px}
  .foot-col a{display:block;color:#d1d7dc;font-size:14px;padding:5px 0;cursor:pointer}
  .foot-col a:hover{color:#fff;text-decoration:underline}
  .foot-bottom{max-width:1100px;margin:28px auto 0;border-top:1px solid #4a4c4f;padding-top:18px;font-size:13px;color:#a6a6a6;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

  /* abas abaixo do vídeo: Overview / Q&A / Chat */
  .ltabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-top:18px}
  .ltabs button{background:none;padding:10px 16px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent}
  .ltabs button.on{color:var(--purple);border-bottom-color:var(--purple)}
  .ltab-body{padding:16px 0;font-size:14px;color:#3e4143}
  .qa-item,.lchat-item{border-bottom:1px solid var(--line);padding:10px 0}
  .lchat-box{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-bottom:10px}
  .lchat-row{display:flex;gap:8px}
  .lchat-row input{flex:1;padding:10px;border:1px solid var(--line);border-radius:999px}
  .lchat-row button{background:var(--purple);color:#fff;padding:0 18px;border-radius:999px;font-weight:700}

  .admin-groups{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:22px}
  .admin-group{display:flex;flex-direction:column;gap:4px;background:#faf9fc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;min-width:160px}
  .admin-group-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--purple);margin-bottom:4px}
  .admin-group button{text-align:left;background:none;border:none;padding:7px 10px;border-radius:6px;font-weight:600;font-size:14px;color:#3e4143;cursor:pointer}
  .admin-group button:hover{background:#f0ebff}
  .admin-group button.on{background:var(--purple);color:#fff}
  .chkrow{display:flex;align-items:center;gap:10px;font-weight:600;cursor:pointer}
  .chkrow input[type=checkbox]{width:20px;height:20px;flex:0 0 auto;margin:0}
  .chkrow span{flex:1}

  @media(max-width:760px){
    /* Cabeçalho organizado: logo+ícones em cima, busca largura cheia embaixo */
    header{gap:8px 10px;padding:8px 14px}
    .logo{order:1}
    .logo img{height:60px}
    .search{order:5;flex-basis:100%;width:100%;margin-top:4px;padding:9px 14px}
    .lang-sel{order:2;margin-left:auto;padding:6px 6px}
    .icon-btn{order:3;padding:5px}
    header > div[style]{order:4}
    .nav-link{order:4;font-size:13px}
    .nav-link.hide-sm{display:none}

    .hero{padding:28px;margin:16px}.hero h1{font-size:26px}
    .filters{padding:10px 14px;gap:8px}
    .filters span{display:flex;align-items:center;flex:1;min-width:0}
    .filters select{flex:1;min-width:0}
    .cats{padding:8px 14px}
    main{padding:0 14px 50px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .card h3{font-size:14px}
    .section-title{font-size:20px}

    .learn-list{grid-template-columns:1fr}
    .player{flex-direction:column}.sidebar{width:100%;border-left:none;border-top:1px solid var(--line);max-height:none}
    .msg-wrap{flex-direction:column}.msg-list{width:100%;max-height:200px}

    .detail-head{padding:24px 14px}.detail-head .inner{gap:24px}
    .buy-box{width:100%}
    .detail-body{padding:0 14px}

    .panel{padding:0 14px}
    .modal-box{padding:24px 20px}
    table.admin{font-size:12px}
    .foot-cols{gap:28px}
  }
  @media(max-width:420px){
    .grid{grid-template-columns:1fr 1fr}
    .hero h1{font-size:22px}.hero p{font-size:15px}
    .tabbar{overflow-x:auto}
  }
</style>
</head>
<body>

function courseSections(course){

}
function allLessons(course){ return courseSections(course).flatMap(s=>s.lessons); }

// converte um link de vídeo em informações para tocar no player
function videoEmbed(url){
  if(!url) return null;
  if(url.startsWith("data:")||/\.(mp4|webm|ogg)(\?|$)/i.test(url)) return {kind:"file", src:url};
  let m;
  if((m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/)))
    return {kind:"embed", provider:"youtube", src:"https://www.youtube.com/embed/"+m[1]};
  if((m=url.match(/vimeo\.com\/(?:video\/)?(\d+)/)))
    return {kind:"embed", provider:"vimeo", src:"https://player.vimeo.com/video/"+m[1]};
  if((m=url.match(/mediadelivery\.net\/(?:embed|play)\/(\d+)\/([a-f0-9-]+)/i)))
    return {kind:"embed", provider:"bunny", src:"https://iframe.mediadelivery.net/embed/"+m[1]+"/"+m[2]};
  return {kind:"link", src:url};
}
// acrescenta o parâmetro de autoplay conforme o provedor
function withAutoplay(emb){
  if(!emb) return "";
  const sep = emb.src.indexOf("?")>=0 ? "&" : "?";
  if(emb.provider==="youtube") return emb.src+sep+"autoplay=1&rel=0";
  if(emb.provider==="vimeo")   return emb.src+sep+"autoplay=1";
  if(emb.provider==="bunny")   return emb.src+sep+"autoplay=true";
  return emb.src;
}

// estatística de quiz de um curso, a partir dos resultados salvos (quizResults: lessonId->{correct,total})
function courseQuizStats(course, quizResults){
  let correct=0, total=0, hasQuiz=false;
  allLessons(course).forEach(l=>{
    const isQuiz = l.type==="quiz" || (l.quiz && l.quiz.length);
    if(isQuiz){ hasQuiz=true; const r=quizResults && quizResults[l.id]; if(r){ correct+=r.correct; total+=r.total; } else if(l.quiz){ total+=l.quiz.length; } }
  });
  const pct = total>0 ? Math.round(correct/total*100) : null;
  return { correct, total, pct, hasQuiz };
}
function isCourseComplete(course, enrollment){
  const ls=allLessons(course); if(!ls.length) return false;
  const done=(enrollment&&enrollment.done)||[];
  return ls.every(l=>done.includes(l.id));
}
// elegível ao certificado: curso concluído E (sem quiz OU nota >= 80%)
function certificateEligible(course, enrollment, quizResults){
  if(!isCourseComplete(course, enrollment)) return false;
  const s=courseQuizStats(course, quizResults);
  if(!s.hasQuiz) return true;
  return s.pct!=null && s.pct>=80;
}
// gera e baixa o certificado em PDF
function generateCertificate({name, course, pct, date, logo}){
  if(!window.jspdf){ alert("Não foi possível gerar o PDF. Recarregue a página e tente de novo."); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({orientation:"landscape",unit:"pt",format:"a4"});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  const purple=[86,36,208], gold=[176,141,60], ink=[40,40,45], soft=[110,115,120];
  // fundo creme
  doc.setFillColor(252,251,248); doc.rect(0,0,W,H,"F");
  // moldura dupla
  doc.setDrawColor(...purple); doc.setLineWidth(7); doc.rect(22,22,W-44,H-44);
  doc.setDrawColor(...gold); doc.setLineWidth(1.5); doc.rect(34,34,W-68,H-68);
  // cantos decorativos
  doc.setDrawColor(...gold); doc.setLineWidth(1.5);
  [[34,34,1,1],[W-34,34,-1,1],[34,H-34,1,-1],[W-34,H-34,-1,-1]].forEach(([x,y,sx,sy])=>{
    doc.line(x+10*sx,y+22*sy,x+10*sx,y+10*sy); doc.line(x+10*sx,y+10*sy,x+22*sx,y+10*sy);
  });
  // logo (imagem PNG/JPEG); se falhar, usa texto
  let topY=92;
  try{ if(logo && /^data:image\/(png|jpe?g)/i.test(logo)){ doc.addImage(logo,"PNG",W/2-44,64,88,52); topY=140; } else throw 0; }
  catch(e){ doc.setFont("helvetica","bold"); doc.setFontSize(26); doc.setTextColor(...purple); doc.text("jewdemy", W/2, 96, {align:"center"}); topY=140; }
  // título
  doc.setFont("times","bold"); doc.setFontSize(40); doc.setTextColor(...purple);
  doc.text("Certificado de Conclusão", W/2, topY+34, {align:"center"});
  // linha decorativa
  doc.setDrawColor(...gold); doc.setLineWidth(1.2); doc.line(W/2-120, topY+50, W/2+120, topY+50);
  // corpo
  doc.setFont("helvetica","normal"); doc.setFontSize(14); doc.setTextColor(...soft);
  doc.text("Este certificado é conferido a", W/2, topY+86, {align:"center"});
  doc.setFont("times","bolditalic"); doc.setFontSize(34); doc.setTextColor(...ink);
  doc.text(name||"Aluno(a)", W/2, topY+126, {align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(14); doc.setTextColor(...soft);
  doc.text("por concluir com aproveitamento o curso", W/2, topY+158, {align:"center"});
  doc.setFont("times","bold"); doc.setFontSize(22); doc.setTextColor(...purple);
  doc.text(course||"", W/2, topY+188, {align:"center", maxWidth:W-180});
  // selo (círculo dourado)
  const sx=W-150, sy=H-150;
  doc.setFillColor(...gold); doc.circle(sx,sy,34,"F");
  doc.setFillColor(252,251,248); doc.circle(sx,sy,27,"F");
  doc.setTextColor(...gold); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("APROVADO", sx, sy+4, {align:"center"});
  // rodapé: nota e data
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(...soft);
  if(pct!=null) doc.text("Aproveitamento nos quizzes: "+pct+"%", 150, H-110, {align:"left"});
  doc.text("Data: "+(date||""), 150, H-90, {align:"left"});
  doc.setDrawColor(...ink); doc.setLineWidth(0.8); doc.line(150, H-72, 330, H-72);
  doc.setFontSize(10); doc.text("jewdemy — cursos de estudos judaicos", 150, H-58, {align:"left"});
  doc.save("certificado-jewdemy.pdf");
}

const PAGE_VIEWS = ["home","aluno","instrutor","admin"];

function App(){
  const [lang,setLang]=useState("pt");
  const t = k => (I18N[lang]&&I18N[lang][k]) || I18N.pt[k] || k;

  const [categories,setCategories]=useState(INITIAL_CATEGORIES);
  const [courses,setCourses]=useState(INITIAL_COURSES);
  const [users,setUsers]=useState([]);
  const [emailTemplates,setEmailTemplates]=useState({
    welcome:{subject:"Bem-vindo à Jewdemy!", body:"Olá {nome}, que bom ter você na Jewdemy. Bons estudos!"},
    enroll:{subject:"Você se inscreveu em um curso", body:"Olá {nome}, sua inscrição no curso \"{curso}\" foi confirmada."},
    recover:{subject:"Recuperação de senha — Jewdemy", body:"Olá {nome}, recebemos um pedido de recuperação de senha. Sua senha é: {senha}"},
  });
  const [sentEmails,setSentEmails]=useState([]);
  const [footerColumns,setFooterColumns]=useState(INITIAL_FOOTER);
  const [adminUnlocked,setAdminUnlocked]=useState(false);
  const [adminTab,setAdminTab]=useState("cats");
  const [banner,setBanner]=useState(null);
  const [design,setDesign]=useState({ logo:LOGO, primary:"#5624d0", heroTitle:"", heroSub:"", siteName:"Jewdemy" });
  const setDesignField=(k,v)=>setDesign(d=>({...d,[k]:v}));
  const DEFAULT_HELP={ intro:"Encontre respostas rápidas ou envie sua dúvida.", faqs:[
    {q:"Como me inscrevo em um curso?", a:"Crie sua conta gratuita, abra o curso desejado e clique em inscrever-se. Cursos gratuitos liberam o acesso na hora."},
    {q:"Os cursos têm certificado?", a:"Em breve disponibilizaremos certificados de conclusão. Por enquanto, você acompanha seu progresso na sua área de aluno."},
    {q:"Como me torno instrutor?", a:"No rodapé, clique em \"Seja um instrutor\" e envie seu pedido. Nossa equipe analisa e cria sua conta de instrutor."},
    {q:"Esqueci minha senha, e agora?", a:"Na janela de login, clique em \"Esqueci minha senha\" e siga as instruções enviadas ao seu e-mail."},
  ]};
  const [helpContent,setHelpContent]=useState(DEFAULT_HELP);
  const loadHelp=async()=>{ if(!SB) return; try{ const { data }=await SB.from("site_settings").select("help_content").eq("id",1).single(); if(data && data.help_content && Array.isArray(data.help_content.faqs)) setHelpContent(data.help_content); }catch(e){} };
  const saveHelp=async(hc)=>{ setHelpContent(hc); if(SB){ const { error }=await SB.from("site_settings").update({ help_content:hc }).eq("id",1); if(error) showToast("Erro ao salvar: "+error.message); else showToast("Central de ajuda salva!"); } };
  const [fInstructor,setFInstructor]=useState("Todos");
  const [freeOnly,setFreeOnly]=useState(false);
  const [instructorRequests,setInstructorRequests]=useState([]);

  const [query,setQuery]=useState("");
  const [cat,setCat]=useState("Todos");
  const [fLevel,setFLevel]=useState("Todos");
  const [fLang,setFLang]=useState("Todos");
  const [view,setView]=useState({name:"home"});
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [user,setUser]=useState(null);
  const [authOpen,setAuthOpen]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const [enrolled,setEnrolled]=useState([]);
  const [wishlist,setWishlist]=useState([]);
  const [threads,setThreads]=useState([]);
  const [qaByCourse,setQaByCourse]=useState({}); // {courseId:[{user,text}]}
  const [toast,setToast]=useState("");
  const showToast = m => { setToast(m); setTimeout(()=>setToast(""),2400); };

  const navTo = (name) => { window.location.hash = name==="home" ? "#/" : "#/"+name; setView({name}); window.scrollTo(0,0); };
  useEffect(()=>{ try{ document.documentElement.dir = lang==="he"?"rtl":"ltr"; }catch(e){} },[lang]);

  // ===== Sessão do Supabase: mantém o usuário logado entre recarregamentos =====
  const [needsProfile,setNeedsProfile]=useState(false);
  const isProfileComplete=(p)=> !!(p && p.name && p.phone && p.city && p.community && p.gender && (p.isJewish===true||p.isJewish===false));
  const loadProfile = async (uid, email, authUser) => {
    if(!SB) return null;
    const { data } = await SB.from("profiles").select("*").eq("id", uid).single();
    let p = data;
    // importa a foto do Google na primeira vez (se ainda não houver foto)
    const meta = (authUser && authUser.user_metadata) || {};
    const gphoto = meta.avatar_url || meta.picture;
    if(p && !p.photo && gphoto){ try{ await SB.from("profiles").update({ photo: gphoto }).eq("id", uid); p = {...p, photo: gphoto}; }catch(e){} }
    return mapProfile(p, email);
  };
  const checkProfile=(p)=>{ setNeedsProfile(!!(p && p.role==="student" && !isProfileComplete(p))); };
  useEffect(()=>{
    if(!SB) return;
    SB.auth.getSession().then(async ({data})=>{
      const s=data && data.session;
      if(s && s.user){ const p=await loadProfile(s.user.id, s.user.email, s.user); if(p){ setUser(p); checkProfile(p); } }
    });
    const { data:sub } = SB.auth.onAuthStateChange(async (_e, s)=>{
      if(s && s.user){ const p=await loadProfile(s.user.id, s.user.email, s.user); if(p && !p.blocked){ setUser(p); checkProfile(p); } }
      else { setUser(null); setNeedsProfile(false); }
    });
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  },[]);
  // carrega os cursos salvos no banco ao abrir o site (todos os visitantes)
  useEffect(()=>{ loadCourses(); loadCategories(); loadHelp(); },[]);
  // carrega as matrículas e o progresso do aluno
  useEffect(()=>{ if(user && user.role==="student") loadEnrollments(user.id); },[user]);
  // quem tem cargo "admin" no banco entra no painel sem precisar de código
  useEffect(()=>{ if(user && user.role==="admin"){ setAdminUnlocked(true); loadUsers(); loadInstructorRequests(); (async()=>{ await seedExamplesIfEmpty(); await loadCourses(); })(); } },[user]);
  useEffect(()=>{ try{ document.documentElement.style.setProperty("--purple", design.primary); }catch(e){} },[design.primary]);
  useEffect(()=>{
    const apply=()=>{
      const h=(window.location.hash||"").replace(/^#\/?/,"");
      const name = PAGE_VIEWS.includes(h) ? h : "home";
      setView(v => (PAGE_VIEWS.includes(v.name) || v.name==="home") ? {name} : v);
    };
    apply();
    window.addEventListener("hashchange",apply);
    return ()=>window.removeEventListener("hashchange",apply);
  },[]);

  const sendEmail = (type, to, vars={}) => {
    const tpl = emailTemplates[type]; if(!tpl) return;
    let body = tpl.body;
    Object.keys(vars).forEach(k=>{ body = body.split("{"+k+"}").join(vars[k]||""); });
    setSentEmails(e=>[{to, subject:tpl.subject, body, at:new Date().toLocaleString()},...e]);
  };
  const sendCustomEmail = (to, subject, body) =>
    setSentEmails(e=>[{to, subject, body, at:new Date().toLocaleString()},...e]);

  const canAccess = (co) => {
    if(!user || user.role!=="student") return true;       // visitantes/instrutor/admin veem tudo
    if(co.womenOnly && user.gender==="male") return false; // homens não acessam "somente mulheres"
    if(user.isJewish===false && !co.openToNonJews) return false; // não-judeus só veem cursos abertos
    return true;
  };
  const filtered = useMemo(()=>courses.filter(co=>
    (cat==="Todos"||co.cat===cat) &&
    (fLevel==="Todos"||co.level===fLevel) &&
    (fLang==="Todos"||co.lang===fLang) &&
    (fInstructor==="Todos"||co.author===fInstructor) &&
    (!freeOnly || co.price===0) &&
    co.active!==false &&
    canAccess(co) &&
    (co.title.toLowerCase().includes(query.toLowerCase())||co.author.toLowerCase().includes(query.toLowerCase()))
  ),[query,cat,fLevel,fLang,fInstructor,freeOnly,courses,user]);
  const instructorsList = useMemo(()=>[...new Set(courses.map(c=>c.author))],[courses]);

  const requireAuth = fn => user ? fn() : (setAuthOpen(true), showToast(t("loginToContinue")));
  const inCart=id=>cart.some(x=>x.id===id);
  const isEnrolled=id=>enrolled.some(e=>e.courseId===id);
  const [quizResults,setQuizResults]=useState({}); // lessonId -> {correct,total}
  const recordQuiz=async(lessonId,correct,total)=>{
    setQuizResults(q=>({...q,[lessonId]:{correct,total}}));
    if(SB && user) await SB.from("quiz_results").upsert({ user_id:user.id, lesson_id:lessonId, correct, total }, { onConflict:"user_id,lesson_id" });
  };
  const loadEnrollments=async(uid)=>{
    if(!SB) return;
    const [en,pr,ls,qz]=await Promise.all([
      SB.from("enrollments").select("course_id").eq("user_id",uid),
      SB.from("lesson_progress").select("lesson_id").eq("user_id",uid),
      SB.from("lessons").select("id,course_id"),
      SB.from("quiz_results").select("lesson_id,correct,total").eq("user_id",uid),
    ]);
    const lessonCourse={}; (ls.data||[]).forEach(l=>{ lessonCourse[l.id]=l.course_id; });
    const byCourse={}; (en.data||[]).forEach(e=>{ byCourse[e.course_id]=[]; });
    (pr.data||[]).forEach(p=>{ const cid=lessonCourse[p.lesson_id]; if(cid!=null){ (byCourse[cid]=byCourse[cid]||[]).push(p.lesson_id); } });
    setEnrolled(Object.keys(byCourse).map(cid=>({courseId:Number(cid), done:byCourse[cid]})));
    const qr={}; (qz.data||[]).forEach(r=>{ qr[r.lesson_id]={correct:r.correct,total:r.total}; }); setQuizResults(qr);
  };
  const enroll=async(courseId)=>{
    if(isEnrolled(courseId)) return;
    setEnrolled(e=>[...e,{courseId,done:[]}]);
    setCourses(cs=>cs.map(c=>c.id===courseId?{...c,students:(c.students||0)+1}:c));
    if(SB && user){ const { error }=await SB.from("enrollments").insert({ user_id:user.id, course_id:courseId }); if(error) showToast("Erro ao inscrever: "+error.message); }
  };
  const studentOnly=(fn)=>requireAuth(()=>{ if(user && user.role!=="student"){ showToast("Esta ação é apenas para alunos."); return; } fn(); });
  const addToCart=co=>studentOnly(()=>{ if(isEnrolled(co.id)){showToast(t("haveCourse"));return;} if(!inCart(co.id))setCart([...cart,co]); setCartOpen(true); });
  const removeFromCart=id=>setCart(cart.filter(x=>x.id!==id));
  const total=cart.reduce((s,x)=>s+x.price,0);

  const checkout=async()=>{
    if(user && user.role!=="student"){ showToast("Esta ação é apenas para alunos."); return; }
    const toAdd = cart.filter(co=>!isEnrolled(co.id));
    for(const co of toAdd){ await enroll(co.id); sendEmail("enroll", user.email, {nome:user.name, curso:co.title}); }
    setCart([]); setCartOpen(false);
    showToast("Inscrição concluída! Cursos liberados.");
    navTo("aluno");
  };

  const toggleFav=id=>requireAuth(()=>setWishlist(w=>w.includes(id)?w.filter(x=>x!==id):[...w,id]));
  const openCourse=co=>{ if(!canAccess(co)){ showToast("Você não tem acesso a este curso."); return; } setView({name:"detail",course:co});window.scrollTo(0,0);};
  const goHome=()=>{navTo("home");setQuery("");setCat("Todos");setFLevel("Todos");setFLang("Todos");setFInstructor("Todos");setFreeOnly(false);};

  const enrollAndLearn=co=>studentOnly(async()=>{
    if(!isEnrolled(co.id)){ await enroll(co.id); sendEmail("enroll",user.email,{nome:user.name,curso:co.title}); }
    setView({name:"learn",course:co});window.scrollTo(0,0);
  });

  const toggleLesson=async(courseId,lessonId)=>{
    const en=enrolled.find(e=>e.courseId===courseId);
    const isDone=!!(en && en.done.includes(lessonId));
    setEnrolled(es=>es.map(e=> e.courseId!==courseId ? e : ({...e, done: isDone ? e.done.filter(x=>x!==lessonId) : [...e.done, lessonId]})));
    if(SB && user){
      if(isDone){ const { error }=await SB.from("lesson_progress").delete().eq("user_id",user.id).eq("lesson_id",lessonId); if(error) showToast("Erro: "+error.message); }
      else { const { error }=await SB.from("lesson_progress").upsert({ user_id:user.id, lesson_id:lessonId }, { onConflict:"user_id,lesson_id" }); if(error) showToast("Erro: "+error.message); }
    }
  };

  const publishCourse=async data=>{
    if(!SB){ showToast("Conexão indisponível"); return; }
    const { data:row, error }=await SB.from("courses").insert({
      author_id:user.id, author_name:user.name, author_bio:data.authorBio||user.bio||"",
      title:data.title, category:data.cat, level:data.level, lang:data.lang,
      price:data.price, old_price:data.old, description:data.desc, learn:data.learn||[],
      thumb:data.thumb||null, women_only:!!data.womenOnly, open_to_non_jews:!!data.openToNonJews,
      active:data.active!==false, students:0
    }).select().single();
    if(error||!row){ showToast(error?error.message:"Erro ao publicar"); return; }
    await saveStructure(row.id, data.sections||[]);
    await loadCourses();
    showToast("Curso publicado!");
    navTo("instrutor");
  };
  const deleteCourse=async(id)=>{
    setCourses(cs=>cs.filter(c=>c.id!==id));
    if(SB) await SB.from("courses").delete().eq("id", id);
    showToast("Curso apagado");
  };

  const doRegister=async(u)=>{
    if(!SB){ showToast("Conexão indisponível"); return false; }
    const { data, error } = await SB.auth.signUp({ email:u.email, password:u.password, options:{ data:{ name:u.name } } });
    if(error){ showToast(error.message||"Não foi possível cadastrar"); return false; }
    const uid = data.user && data.user.id;
    if(uid){ await SB.from("profiles").update({ name:u.name, email:u.email, phone:u.phone, city:u.city, community:u.community, is_jewish:u.isJewish, gender:u.gender }).eq("id", uid); }
    if(!data.session){ setAuthOpen(false); showToast("Conta criada! Confirme seu e-mail para entrar."); return true; }
    const p = await loadProfile(uid, u.email);
    if(p) setUser(p);
    setAuthOpen(false); showToast(`Bem-vindo, ${u.name}!`);
    navTo("home");
    return true;
  };
  const doLogin=async(email,password)=>{
    if(!SB){ showToast("Conexão indisponível"); return false; }
    const { data, error } = await SB.auth.signInWithPassword({ email, password });
    if(error){ showToast("E-mail/senha inválidos ou e-mail não confirmado."); return false; }
    const p = await loadProfile(data.user.id, email);
    if(p && p.blocked){ await SB.auth.signOut(); setUser(null); showToast("Sua conta está bloqueada."); return false; }
    if(p) setUser(p);
    setAuthOpen(false); showToast(`Bem-vindo, ${p?p.name:""}!`);
    navTo("home");
    return true;
  };
  const recoverPassword=async(email)=>{
    if(!SB){ showToast("Conexão indisponível"); return false; }
    const { error } = await SB.auth.resetPasswordForEmail(email);
    if(error){ showToast(error.message||t("recoverNotFound")); return false; }
    showToast(t("recoverSent"));
    return true;
  };
  const doGoogleLogin=async()=>{
    if(!SB){ showToast("Conexão indisponível"); return; }
    const { error }=await SB.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: window.location.origin } });
    if(error) showToast(error.message||"Erro ao entrar com Google");
  };
  const loginAsInstructor=async(email,pw)=>{
    if(!SB){ showToast("Conexão indisponível"); return; }
    const { data, error } = await SB.auth.signInWithPassword({ email, password:pw });
    if(error){ showToast("Credenciais inválidas"); return; }
    const p = await loadProfile(data.user.id, email);
    if(p && p.blocked){ await SB.auth.signOut(); setUser(null); showToast("Conta bloqueada"); return; }
    if(!p || p.role!=="instructor"){ await SB.auth.signOut(); setUser(null); showToast("Esta conta não é de instrutor"); return; }
    setUser(p); showToast(`Bem-vindo, ${p.name}!`); navTo("instrutor");
  };
  const submitInstructorApplication=async(data)=>{
    if(SB){ const { error }=await SB.from("instructor_requests").insert({ name:data.name, email:data.email, area:data.area||"", experience:data.experience||"" });
      if(error){ showToast(error.message||"Erro ao enviar"); return; } }
    await sendToOwner("[Jewdemy] Formulário: Pedido de instrutor", {formulario:"Pedido de instrutor", nome:data.name, email:data.email, area:data.area||"", experiencia:data.experience||""});

// ============ LEARN (player) ============
function Learn({course,t,enrollment,onBack,onToggle,qa,onAddQA,chat,onChat,userEmail,quizResults,onQuizScore,studentName,certLogo}){
  const sections=courseSections(course);
  const flat=sections.flatMap(s=>s.lessons).filter(Boolean);
  const done=enrollment?.done||[];
  const firstIncomplete = (flat.find(l=>!done.includes(l.id)) || flat[0]);
  const [lessonId,setLessonId]=useState(firstIncomplete?.id);
  const [countdown,setCountdown]=useState(null);
  const [startIn,setStartIn]=useState(null);
  const [autoplay,setAutoplay]=useState(false);
  const [ltab,setLtab]=useState("overview");
  const [qaText,setQaText]=useState("");
  const [chatText,setChatText]=useState("");
  const videoRef=React.useRef(null);

  const lesson=flat.find(l=>l.id===lessonId)||flat[0];
  const ltype=(lesson&&lesson.type)||(lesson&&lesson.quiz&&lesson.quiz.length?"quiz":(lesson&&lesson.text?"text":"video"));
  const idx=lesson?flat.findIndex(l=>l.id===lesson.id):-1;
  const next=flat[idx+1];
  const pct=Math.round((done.length/Math.max(1,flat.length))*100);

  const goTo=(id)=>{ setCountdown(null); setLessonId(id); window.scrollTo(0,0); };

  useEffect(()=>{ setCountdown(null); },[lessonId]);

  useEffect(()=>{
    const emb=videoEmbed(lesson&&lesson.video);
    setAutoplay(false);
    if(ltype!=="video" || !emb || (emb.kind!=="file" && emb.kind!=="embed")){ setStartIn(null); return; }
    setStartIn(5);
  },[lessonId]);
  useEffect(()=>{
    if(startIn===null) return;
    if(startIn<=0){ setStartIn(null);
      const emb=videoEmbed(lesson&&lesson.video);
      if(emb&&emb.kind==="file"){ try{ videoRef.current&&videoRef.current.play(); }catch(e){} }
      else if(emb&&emb.kind==="embed"){ setAutoplay(true); }
      return; }
    const tmr=setTimeout(()=>setStartIn(startIn-1),1000);
    return ()=>clearTimeout(tmr);
  },[startIn]);

  useEffect(()=>{
    if(countdown===null) return;
    if(countdown<=0){ if(next) goTo(next.id); return; }
    const tmr=setTimeout(()=>setCountdown(countdown-1),1000);
    return ()=>clearTimeout(tmr);
  },[countdown]);

  const handleEnded=()=>{
    if(lesson && !done.includes(lesson.id)) onToggle(course.id,lesson.id);
    if(next) setCountdown(5);
  };

  // detecta o fim de vídeos incorporados (Bunny via player.js) para concluir e avançar
  const endedRef=React.useRef(()=>{});
  endedRef.current=handleEnded;
  useEffect(()=>{
    const emb=videoEmbed(lesson&&lesson.video);
    if(!emb || emb.kind!=="embed" || emb.provider!=="bunny") return;
    const subscribe=()=>{ const ifr=document.querySelector(".video iframe");
      if(ifr&&ifr.contentWindow){ try{ ifr.contentWindow.postMessage(JSON.stringify({context:"player.js",version:"0.0.11",method:"addEventListener",value:"ended",listener:"jd-ended"}),"*"); }catch(e){} } };
    const onMsg=(e)=>{ if(typeof e.data!=="string") return; let d; try{ d=JSON.parse(e.data); }catch(_){ return; }
      if(!d || d.context!=="player.js") return;
      if(d.event==="ready") subscribe();
      if(d.event==="ended") endedRef.current(); };
    window.addEventListener("message", onMsg);
    const t1=setTimeout(subscribe,1200), t2=setTimeout(subscribe,3000);
    return ()=>{ window.removeEventListener("message", onMsg); clearTimeout(t1); clearTimeout(t2); };
  },[lessonId, autoplay]);

  if(!flat.length || !lesson){
    return (<div className="panel" style={{maxWidth:700}}>
      <span className="back" onClick={onBack}>← {t("myCourses")}</span>
      <div className="empty" style={{marginTop:20}}><p>Este curso ainda não tem aulas publicadas.</p></div>
    </div>);
  }

  return (
    <div>
      <span className="back" onClick={onBack}>← {t("myCourses")}</span>
      <div className="player">
        <div className="player-main">
          {ltype==="video" &&
            <div className="video">
              {(()=>{ const emb=videoEmbed(lesson.video);
                if(!emb) return <><div className="big">▶</div><div>{lesson.title}</div><div style={{fontSize:12,opacity:.6}}>(o instrutor ainda não adicionou o vídeo)</div></>;
                if(emb.kind==="embed") return <iframe key={lesson.id+(autoplay?"-a":"")} src={autoplay?withAutoplay(emb):emb.src} title={lesson.title} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen style={{width:"100%",height:"100%",border:0}}></iframe>;
                if(emb.kind==="file") return <video ref={videoRef} key={lesson.id} src={emb.src} controls onEnded={handleEnded} style={{width:"100%",height:"100%"}}/>;
                return <div style={{padding:20,textAlign:"center"}}><a href={emb.src} target="_blank" rel="noopener noreferrer" style={{color:"#fff",fontWeight:700}}>▶ Abrir vídeo</a></div>;
              })()}
              {startIn!==null && (()=>{ const emb=videoEmbed(lesson.video); return emb&&(emb.kind==="file"||emb.kind==="embed"); })() &&
                <div className="next-overlay">
                  <h3>▶ {lesson.title}</h3>
                  <div className="count">Começa em {startIn}s…</div>
                  <div className="row">
                    <button className="go" onClick={()=>{ setStartIn(null); const emb=videoEmbed(lesson.video); if(emb&&emb.kind==="file"){ try{videoRef.current&&videoRef.current.play();}catch(e){} } else { setAutoplay(true); } }}>Iniciar agora</button>
                    <button className="cancel" onClick={()=>setStartIn(null)}>✕</button>
                  </div>
                </div>}
              {countdown!==null && next &&
                <div className="next-overlay">
                  <h3>{t("nextLesson").replace(" →","")}</h3>
                  <div>{next.title}</div>
                  <div className="count">{countdown}s…</div>
                  <div className="row">
                    <button className="go" onClick={()=>goTo(next.id)}>{t("nextLesson")}</button>
                    <button className="cancel" onClick={()=>setCountdown(null)}>✕</button>
                  </div>
                </div>}
            </div>}
          {ltype==="quiz" &&
            <div className="player-meta">
              {(lesson.quiz&&lesson.quiz.length)
                ? <Quiz quiz={lesson.quiz} t={t} onDone={(correct,total)=>{ if(!done.includes(lesson.id)) onToggle(course.id,lesson.id); onQuizScore&&onQuizScore(lesson.id,correct,total); }}/>
                : <p style={{color:"#6a6f73"}}>{t("noQuestions")}</p>}
            </div>}
          {ltype==="text" &&
            <div className="player-meta">
              <h2 style={{fontSize:20,marginBottom:10}}>{lesson.title}</h2>
              <div style={{whiteSpace:"pre-wrap",lineHeight:1.6,color:"#3e4143"}}>{lesson.text||"—"}</div>
            </div>}
          <div className="player-meta">
            <h2 style={{fontSize:20}}>{lesson.title}</h2>
            <p style={{color:"#6a6f73",marginTop:6}}>{course.title} · {course.author}</p>
            <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
              <button className="btn-primary" onClick={()=>onToggle(course.id,lesson.id)}>
                {done.includes(lesson.id)?t("markUndone"):t("markDone")}
              </button>
              {next && <button className="btn-ghost" onClick={()=>goTo(next.id)}>{t("nextLesson")}</button>}
            </div>
            <div className="ltabs">
              <button className={ltab==="overview"?"on":""} onClick={()=>setLtab("overview")}>Overview</button>
              <button className={ltab==="qa"?"on":""} onClick={()=>setLtab("qa")}>Q&amp;A</button>
              <button className={ltab==="chat"?"on":""} onClick={()=>setLtab("chat")}>Chat</button>
            </div>
            <div className="ltab-body">
              {ltab==="overview" &&
                <div>
                  <p style={{marginBottom:10}}>{course.desc}</p>
                  <b>{t("currentLesson")}</b> {lesson.title} ({lesson.dur})
                </div>}
              {ltab==="qa" &&
                <div>
                  <div className="lchat-row" style={{marginBottom:12}}>
                    <input value={qaText} onChange={e=>setQaText(e.target.value)} placeholder={t("askPlaceholder")} onKeyDown={e=>{if(e.key==="Enter"&&qaText.trim()){onAddQA(course.id,qaText.trim());setQaText("");}}}/>
                    <button onClick={()=>{ if(qaText.trim()){onAddQA(course.id,qaText.trim());setQaText("");} }}>{t("ask")}</button>
                  </div>
                  {(qa&&qa.length)? qa.map((q,i)=>
                    <div className="qa-item" key={i}>
                      <b>{q.user}</b><div>{q.text}</div>
                      {q.answer && <div style={{marginTop:6,paddingLeft:12,borderLeft:"3px solid var(--purple)",color:"#3e4143"}}><b style={{color:"var(--purple)"}}>{t("instructorAnswer")}</b> {q.answer}</div>}
                    </div>)
                    : <p style={{color:"#6a6f73"}}>{t("noQuestions")}</p>}
                </div>}
              {ltab==="chat" &&
                <div>
                  <p style={{color:"#6a6f73",fontSize:13,marginBottom:8}}>{t("chatWith")} {course.author}.</p>
                  <div className="lchat-box">
                    {(chat&&chat.length)? chat.map((m,i)=>
                      <div key={i} className={"bubble "+(m.from===userEmail?"me":"them")}>{m.text}</div>)
                      : <p style={{color:"#6a6f73",textAlign:"center"}}>{t("firstMessage")}</p>}
                  </div>
                  <div className="lchat-row">
                    <input value={chatText} onChange={e=>setChatText(e.target.value)} placeholder={t("writeMessage")} onKeyDown={e=>{if(e.key==="Enter"&&chatText.trim()){onChat(chatText.trim());setChatText("");}}}/>
                    <button onClick={()=>{ if(chatText.trim()){onChat(chatText.trim());setChatText("");} }}>{t("send")}</button>
                  </div>
                </div>}
            </div>
          </div>
        </div>
        <div className="sidebar">
          <h3>{t("courseContent")}</h3>
          <div style={{padding:"0 16px 12px"}}>
            <div className="progress-bar"><i style={{width:pct+"%"}}></i></div>
            <span style={{fontSize:12,color:"#6a6f73"}}>{pct}% {t("completed")}</span>
          </div>
          {pct===100 && (()=>{ const s=courseQuizStats(course,quizResults); const ok=certificateEligible(course,enrollment,quizResults);
            return (<div style={{margin:"0 12px 14px",padding:14,borderRadius:10,background:ok?"#e6f4ec":"#fff4e6",border:"1px solid "+(ok?"#bfe3cc":"#ffd9a8")}}>
              <div style={{fontWeight:800,fontSize:15,marginBottom:6}}>{ok?"🎉 Curso concluído!":"Curso concluído"}</div>
              {s.hasQuiz && <div style={{fontSize:13,marginBottom:8}}>Sua nota nos quizzes: <b>{s.pct!=null?s.pct+"%":"—"}</b>{!ok && s.pct!=null && <span> (mínimo de 80% para o certificado)</span>}</div>}
              {ok
                ? <button className="btn-primary" style={{width:"100%"}} onClick={()=>generateCertificate({name:studentName,course:course.title,pct:s.hasQuiz?s.pct:null,date:new Date().toLocaleDateString("pt-BR"),logo:certLogo})}>📜 Baixar certificado (PDF)</button>
                : (s.hasQuiz ? <div style={{fontSize:12,color:"#8a5a00"}}>Refaça os quizzes para atingir 80% e liberar o certificado.</div> : null)}
            </div>);
          })()}
          {sections.map((sec,si)=>(
            <div key={si}>
              {sec.title && <div className="sec-head">{sec.title}</div>}
              {sec.lessons.map(l=>(
                <React.Fragment key={l.id}>
                  <div className={"lesson"+(l.id===lesson.id?" active":"")} onClick={()=>setLessonId(l.id)}>
                    <div className={"chk"+(done.includes(l.id)?" done":"")} onClick={e=>{e.stopPropagation();onToggle(course.id,l.id);}}>{done.includes(l.id)?"✓":""}</div>
                    <div style={{flex:1}}>{l.title}</div>
                    <span style={{fontSize:12,color:"#6a6f73"}}>{l.dur}</span>
                  </div>
                  {l.resources&&l.resources.length>0 &&
                    <div className="lesson-res">
                      {l.resources.map((r,ri)=><a key={ri} href={r.url||"#"} download={r.name}>⬇ {r.name}</a>)}
                    </div>}
                </React.Fragment>
              ))}
            </div>))}
        </div>
      </div>
    </div>
  );
}

// ============ QUIZ (aluno responde, mostra nota e respostas certas) ============
function Quiz({quiz,t,onDone}){
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const score=quiz.reduce((s,q,i)=>s+(answers[i]===q.correct?1:0),0);
  return (
    <div>
      <h3 style={{fontSize:18,marginBottom:12}}>{t("quizLbl")}</h3>
      {quiz.map((q,qi)=>(
        <div key={qi} style={{marginBottom:16}}>
          <p style={{fontWeight:700,marginBottom:8}}>{qi+1}. {q.q}</p>
          {q.options.map((opt,oi)=>{
            const chosen=answers[qi]===oi;
            const isCorrect=q.correct===oi;
            let bg="#fff",bd="var(--line)";
            if(submitted){
              if(isCorrect){ bg="#e6f4ec"; bd="var(--green)"; }
              else if(chosen){ bg="#fdeaea"; bd="var(--red)"; }
            } else if(chosen){ bg="#f0ebff"; bd="var(--purple)"; }
            return (
              <div key={oi} onClick={()=>!submitted&&setAnswers({...answers,[qi]:oi})}
                style={{border:`1px solid ${bd}`,background:bg,borderRadius:6,padding:"10px 12px",marginBottom:6,cursor:submitted?"default":"pointer",fontSize:14}}>
                {opt||`Opção ${oi+1}`}
                {submitted&&isCorrect && <span style={{color:"var(--green)",fontWeight:700,marginLeft:8}}>✓ {t("quizCorrect")}</span>}
              </div>);
          })}
        </div>))}
      {!submitted
        ? <button className="btn-primary" onClick={()=>{setSubmitted(true); onDone&&onDone(score,quiz.length);}} disabled={Object.keys(answers).length<quiz.length}>{t("quizSubmit")}</button>
        : <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <div style={{fontSize:18,fontWeight:800}}>{t("quizScore")}: {score}/{quiz.length} ({Math.round(score/quiz.length*100)}%)</div>
            <button className="btn-ghost" onClick={()=>{setAnswers({});setSubmitted(false);}}>{t("quizRetry")}</button>
          </div>}
    </div>
  );
}
function StudentArea({t,lang,user,courses,enrolled,wishlist,onOpenCourse,onBrowse,onWishlistOpen,onFav,onMessages,onProfile,quizResults,certLogo}){
  const [tab,setTab]=useState("courses");
  const list=enrolled.map(e=>({...courses.find(c=>c.id===e.courseId),enrollment:e})).filter(c=>c.id);
  const favList=courses.filter(co=>wishlist.includes(co.id));
  return (
    <div className="panel" style={{maxWidth:1100}}>
      <h1>{t("studentArea")} · {user.name}</h1>
      <div className="tabbar">
        <button className={tab==="courses"?"on":""} onClick={()=>setTab("courses")}>{t("myCourses")}</button>
        <button className={tab==="fav"?"on":""} onClick={()=>setTab("fav")}>{t("wishlist")}</button>
        <button onClick={onMessages}>{t("messages")}</button>
        <button onClick={onProfile}>{t("profile")}</button>
      </div>
      {tab==="courses" && (list.length?
        <div className="grid">{list.map(co=>{
          const lessons=allLessons(co);
          const pct=Math.round((co.enrollment.done.length/Math.max(1,lessons.length))*100);
          return (
            <div className="card" key={co.id} onClick={()=>onOpenCourse(co)}>
              <div className="thumb" style={{background:COLORS[co.id%COLORS.length]}}>{co.thumb?<img src={co.thumb} alt=""/>:co.title[0]}</div>
              <h3>{co.title}</h3><div className="author">{co.author}</div>
              <div className="progress-bar" style={{marginTop:8}}><i style={{width:pct+"%"}}></i></div>
              <span style={{fontSize:12,color:"#6a6f73"}}>{pct}% {t("completed")}</span>
              {certificateEligible(co,co.enrollment,quizResults) &&
                <button className="btn-primary" style={{marginTop:10,width:"100%"}} onClick={(e)=>{ e.stopPropagation(); const s=courseQuizStats(co,quizResults); generateCertificate({name:user.name,course:co.title,pct:s.hasQuiz?s.pct:null,date:new Date().toLocaleDateString("pt-BR"),logo:certLogo}); }}>📜 Certificado</button>}
            </div>);
        })}</div>
        :<div className="empty"><p>{t("noMine")}</p><button className="btn-primary" style={{marginTop:14}} onClick={onBrowse}>{t("explore")}</button></div>)}
      {tab==="fav" && (favList.length?
        <div className="grid">{favList.map(co=><Card key={co.id} course={co} t={t} lang={lang} onOpen={onWishlistOpen} fav={true} onFav={onFav}/>)}</div>
        :<p className="empty">—</p>)}
    </div>
  );
}
// ============ COURSE EDITOR (cria e edita, com seções) ============
function CourseEditor({t,lang,categories,initial,onSubmit,submitLabel}){
  const [title,setTitle]=useState(initial?.title||"");
  const [cat,setCat]=useState(initial?.cat||categories[0]||"Desenvolvimento");
  const [level,setLevel]=useState(initial?.level||"beginner");
  const [clang,setCLang]=useState(initial?.lang||"Português");
  const [price,setPrice]=useState(initial?String(initial.price):"49.90");
  const [old,setOld]=useState(initial?String(initial.old):"199.90");
  const [desc,setDesc]=useState(initial?.desc||"");
  const [authorBio,setAuthorBio]=useState(initial?.authorBio||"");
  const [learn,setLearn]=useState(initial?(initial.learn||[]).join("\n"):"");
  const [thumb,setThumb]=useState(initial?.thumb||null);
  const [womenOnly,setWomenOnly]=useState(initial?.womenOnly||false);
  const [openToNonJews,setOpenToNonJews]=useState(initial?.openToNonJews||false);
  const [active,setActive]=useState(initial?initial.active!==false:true);
  // seções: [{title, lessons:[{title,dur,video,resources}]}]
  const initSections = initial
    ? courseSections(initial).map(s=>({title:s.title||"", lessons:s.lessons.map(l=>({title:l.title,dur:l.dur,type:l.type||"video",video:l.video||"",resources:l.resources||[],quiz:l.quiz||[],text:l.text||""}))}))
    : [{title:"", lessons:[{title:"",dur:"5:00",type:"video",video:"",resources:[],quiz:[],text:""}]}];
  const [sections,setSections]=useState(initSections);

  const fileToData=(file,cb)=>{ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); };
  const setLesson=(si,li,patch)=>setSections(ss=>ss.map((s,i)=>i!==si?s:{...s,lessons:s.lessons.map((l,j)=>j===li?{...l,...patch}:l)}));
  const setSecTitle=(si,v)=>setSections(ss=>ss.map((s,i)=>i===si?{...s,title:v}:s));
  const addLesson=(si)=>setSections(ss=>ss.map((s,i)=>i===si?{...s,lessons:[...s.lessons,{title:"",dur:"5:00",type:"video",video:"",resources:[],quiz:[],text:""}]}:s));
  const removeLesson=(si,li)=>setSections(ss=>ss.map((s,i)=>i===si?{...s,lessons:s.lessons.filter((_,j)=>j!==li)}:s));
  const addSection=()=>setSections([...sections,{title:"",lessons:[{title:"",dur:"5:00",type:"video",video:"",resources:[],quiz:[],text:""}]}]);
  const removeSection=(si)=>setSections(sections.filter((_,i)=>i!==si));
  const onVideo=(si,li,file)=>{ if(file) fileToData(file,d=>setLesson(si,li,{video:d})); };
  const onResource=(si,li,file)=>{ if(file) fileToData(file,d=>setLesson(si,li,{resources:[...sections[si].lessons[li].resources,{name:file.name,url:d}]})); };
  const removeResource=(si,li,ri)=>setLesson(si,li,{resources:sections[si].lessons[li].resources.filter((_,j)=>j!==ri)});
  const updLesson=(si,li,fn)=>setSections(ss=>ss.map((s,i)=>i!==si?s:{...s,lessons:s.lessons.map((l,j)=>j===li?fn(l):l)}));
  const addQuestion=(si,li)=>updLesson(si,li,l=>({...l,quiz:[...(l.quiz||[]),{q:"",options:["","","",""],correct:0}]}));
  const removeQuestion=(si,li,qi)=>updLesson(si,li,l=>({...l,quiz:(l.quiz||[]).filter((_,j)=>j!==qi)}));
  const setQuestion=(si,li,qi,patch)=>updLesson(si,li,l=>({...l,quiz:(l.quiz||[]).map((q,j)=>j===qi?{...q,...patch}:q)}));
  const setOption=(si,li,qi,oi,val)=>updLesson(si,li,l=>({...l,quiz:(l.quiz||[]).map((q,j)=>j!==qi?q:{...q,options:q.options.map((o,k)=>k===oi?val:o)})}));

  const submit=()=>{
    if(!title.trim()){alert("Dê um título ao curso");return;}
    let lid=0;
    const outSections=sections.map(s=>({
      title:s.title.trim()||null,
      lessons:s.lessons.filter(l=>l.title.trim()).map(l=>({id:++lid,title:l.title,dur:l.dur||"5:00",type:l.type||"video",video:l.video,text:l.text||"",resources:l.resources,quiz:(l.quiz||[]).filter(q=>q.q.trim())}))
    })).filter(s=>s.lessons.length);
    if(!outSections.length){alert("Adicione ao menos uma aula com título");return;}
    const curriculum=outSections.flatMap(s=>s.lessons);
    onSubmit({ title, cat, level, lang:clang, price:parseFloat(price)||0, old:parseFloat(old)||0, thumb, womenOnly, openToNonJews, active,
      desc, authorBio, learn:learn.split("\n").map(s=>s.trim()).filter(Boolean), sections:outSections, curriculum });
  };

  return (
    <div className="form-card">
      <div className="field"><label>{t("title")}</label><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ex: Curso de JavaScript do Zero"/></div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        <div className="field" style={{flex:1,minWidth:140}}><label>{t("category")}</label>
          <select value={cat} onChange={e=>setCat(e.target.value)}>{categories.map(c=><option key={c} value={c}>{catLabel(c,lang)}</option>)}</select></div>
        <div className="field" style={{flex:1,minWidth:140}}><label>{t("level")}</label>
          <select value={level} onChange={e=>setLevel(e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>{t(l)}</option>)}</select></div>
        <div className="field" style={{flex:1,minWidth:140}}><label>{t("language")}</label>
          <select value={clang} onChange={e=>setCLang(e.target.value)}>{COURSE_LANGS.map(l=><option key={l}>{l}</option>)}</select></div>
      </div>
      <div style={{display:"flex",gap:12}}>
        <div className="field" style={{flex:1}}><label>{t("priceLbl")}</label><input type="number" min="0" step="0.01" value={price} onChange={e=>setPrice(e.target.value)}/></div>
        <div className="field" style={{flex:1}}><label>{t("oldPriceLbl")}</label><input type="number" min="0" step="0.01" value={old} onChange={e=>setOld(e.target.value)}/></div>
      </div>
      <div className="field"><label>{t("description")}</label><textarea rows="3" value={desc} onChange={e=>setDesc(e.target.value)}></textarea></div>
      <div className="field"><label>Descrição do instrutor <span className="hint">(aparece na página do curso)</span></label><textarea rows="3" value={authorBio} onChange={e=>setAuthorBio(e.target.value)} placeholder="Ex.: Rav David Cohen leciona Tanach há mais de 20 anos..."></textarea></div>
      <div className="field"><label>{t("coverImage")}</label>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:120,height:68,borderRadius:6,overflow:"hidden",background:"#eceaf6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#6a6f73"}}>
            {thumb?<img src={thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:t("noCover")}</div>

              <div className="row" style={{gap:6}}>
                <label style={{fontSize:12,fontWeight:700,minWidth:50}}>{t("lessonType")}</label>
                {["video","quiz","text"].map(tp=>(
                  <button key={tp} type="button" onClick={()=>setLesson(si,li,{type:tp})}
                    style={{padding:"6px 12px",borderRadius:6,fontWeight:700,fontSize:13,
                      border:`1px solid ${(l.type||"video")===tp?"var(--purple)":"var(--line)"}`,
                      background:(l.type||"video")===tp?"#f0ebff":"#fff", color:(l.type||"video")===tp?"var(--purple)":"#6a6f73"}}>
                    {tp==="video"?t("videoLbl"):tp==="quiz"?t("quizLbl"):t("textLbl")}</button>))}
              </div>

              {(l.type||"video")==="video" &&
                <div style={{marginTop:8}}>
                  <label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:4}}>Link do vídeo (YouTube, Vimeo ou MP4)</label>
                  <input style={{width:"100%",padding:9,border:"1px solid var(--line)",borderRadius:4}} value={l.video||""} onChange={e=>setLesson(si,li,{video:e.target.value})} placeholder="https://www.youtube.com/watch?v=..."/>
                  <span style={{fontSize:11,color:"#6a6f73"}}>Cole o link do vídeo. Para cursos gratuitos, recomendamos YouTube.</span>
                </div>}

              {l.type==="text" &&
                <div style={{marginTop:8}}>
                  <label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:4}}>{t("textLbl")}</label>
                  <textarea rows="4" style={{width:"100%",padding:9,border:"1px solid var(--line)",borderRadius:4}} value={l.text||""} onChange={e=>setLesson(si,li,{text:e.target.value})}></textarea>
                </div>}

              {l.type==="quiz" &&
                <div style={{marginTop:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <label style={{fontSize:12,fontWeight:700}}>{t("quizLbl")}</label>
                    <button className="btn-ghost" style={{padding:"6px 12px",fontSize:13}} onClick={()=>addQuestion(si,li)}>{t("addQuestion")}</button>
                  </div>
                  {(l.quiz||[]).map((q,qi)=>(
                    <div key={qi} style={{background:"#fff",border:"1px solid var(--line)",borderRadius:6,padding:10,marginBottom:8}}>
                      <div style={{display:"flex",gap:6,marginBottom:6}}>
                        <input style={{flex:1}} placeholder={t("question")+" "+(qi+1)} value={q.q} onChange={e=>setQuestion(si,li,qi,{q:e.target.value})}/>
                        <button className="btn-danger" onClick={()=>removeQuestion(si,li,qi)}>×</button>
                      </div>
                      {q.options.map((opt,oi)=>(
                        <div key={oi} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <button type="button" onClick={()=>setQuestion(si,li,qi,{correct:oi})}
                            style={{minWidth:96,padding:"7px 10px",borderRadius:6,fontWeight:700,fontSize:12,
                              border:`1px solid ${q.correct===oi?"var(--green)":"var(--line)"}`,
                              background:q.correct===oi?"#e6f4ec":"#fff", color:q.correct===oi?"#1a7a44":"#6a6f73"}}>
                            {q.correct===oi?"✓ "+t("correctAnswer"):t("correctAnswer")+"?"}</button>
                          <input style={{flex:1}} placeholder={`Opção ${oi+1}`} value={opt} onChange={e=>setOption(si,li,qi,oi,e.target.value)}/>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>}

              <div className="row" style={{marginTop:8}}>
                <label style={{fontSize:12,fontWeight:600,minWidth:50}}>{t("resourcesLbl")}</label>
                <input type="file" onChange={e=>{onResource(si,li,e.target.files[0]); e.target.value="";}}/>
              </div>
              {l.resources.length>0 &&
                <div>{l.resources.map((r,ri)=><span className="chip" key={ri}>📎 {r.name}<button onClick={()=>removeResource(si,li,ri)}>×</button></span>)}</div>}
            </div>
          ))}
          <button className="btn-ghost" onClick={()=>addLesson(si)}>{t("addLesson")}</button>
        </div>
      ))}
      <button className="btn-ghost" onClick={addSection} style={{marginBottom:16,marginRight:8}}>{t("addSection")}</button>
      <div style={{marginTop:8}}><button className="btn-primary" onClick={submit}>{submitLabel}</button></div>
    </div>
  );
}

// ============ Q&A EDITOR (instrutor responde perguntas) ============
function QAEditor({questions,onAnswer,t}){
  const [drafts,setDrafts]=useState({});
  if(!questions.length) return <p style={{color:"#6a6f73"}}>Nenhuma pergunta de aluno ainda.</p>;
  return (
    <div className="form-card">
      {questions.map(q=>(
        <div key={q.id} style={{borderBottom:"1px solid var(--line)",padding:"12px 0"}}>
          <b>{q.user}</b><div style={{marginBottom:8}}>{q.text}</div>
          {q.answer
            ? <div style={{paddingLeft:12,borderLeft:"3px solid var(--purple)",color:"#3e4143"}}><b style={{color:"var(--purple)"}}>{t("instructorAnswer")}</b> {q.answer}</div>
            : <div style={{display:"flex",gap:8}}>
                <input style={{flex:1,padding:9,border:"1px solid var(--line)",borderRadius:4}} placeholder="Responder..." value={drafts[q.id]||""} onChange={e=>setDrafts({...drafts,[q.id]:e.target.value})}/>
                <button className="btn-primary" onClick={()=>{ if((drafts[q.id]||"").trim()){ onAnswer(q.id,drafts[q.id].trim()); } }}>Responder</button>
              </div>}
        </div>))}
    </div>
  );
}

// ============ PROFILE ============
function CompleteProfile({user,t,onSave,onLogout}){
  const [name,setName]=useState(user.name||"");
  const [phone,setPhone]=useState(user.phone||"");
  const [city,setCity]=useState(user.city||"");
  const [community,setCommunity]=useState(user.community||"");
  const [gender,setGender]=useState(user.gender||"");
  const [isJewish,setIsJewish]=useState(user.isJewish===true?"yes":user.isJewish===false?"no":"");
  const submit=()=>{
    if(!name.trim()||!phone.trim()||!city.trim()||!community.trim()||!gender||!isJewish){ alert(t("errRequired")); return; }
    if(phone.replace(/[^\d]/g,"").length<8){ alert(t("errPhone")); return; }
    onSave({ name, phone:phone.replace(/[^\d]/g,""), city, community, gender, isJewish:isJewish==="yes" });
  };
  return (
    <div className="panel" style={{maxWidth:560,paddingTop:30}}>
      <h1>{t("completeProfileTitle")}</h1>
      <p style={{color:"#6a6f73",marginBottom:18}}>{t("completeProfileIntro")}</p>
      <div className="form-card">
        {user.photo && <div style={{textAlign:"center",marginBottom:12}}><img src={user.photo} alt="" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover"}}/></div>}
        <div className="field"><label>{t("name")}</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="field"><label>{t("phone")}</label><input value={phone} onChange={e=>setPhone(e.target.value)}/></div>
        <div style={{display:"flex",gap:10}}>
          <div className="field" style={{flex:1}}><label>{t("city")}</label><input value={city} onChange={e=>setCity(e.target.value)}/></div>
          <div className="field" style={{flex:1}}><label>{t("community")}</label><input value={community} onChange={e=>setCommunity(e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div className="field" style={{flex:1}}><label>{t("gender")}</label>
            <select value={gender} onChange={e=>setGender(e.target.value)}><option value="">—</option><option value="male">{t("male")}</option><option value="female">{t("female")}</option></select></div>
          <div className="field" style={{flex:1}}><label>{t("areYouJewish")}</label>
            <select value={isJewish} onChange={e=>setIsJewish(e.target.value)}><option value="">—</option><option value="yes">{t("yes")}</option><option value="no">{t("no")}</option></select></div>
        </div>
        <button className="btn-primary" style={{width:"100%"}} onClick={submit}>{t("save")}</button>
        <button className="btn-ghost" style={{width:"100%",marginTop:8}} onClick={onLogout}>{t("logout")}</button>
      </div>
    </div>
  );
}

// ============ MESSAGES ============
function Messages({threads,user,activeKey,onSelect,onSend,onBack,t}){
  const [text,setText]=useState("");
  const active=threads.find(th=>th.key===activeKey)||threads[0];
  const send=()=>{ if(text.trim()&&active){ onSend(active.key,text.trim()); setText(""); } };
  const other = th => th.studentEmail===user.email ? th.withName : th.studentName;
  return (
    <div className="panel" style={{maxWidth:1000}}>
      <span className="back" onClick={onBack} style={{margin:"0 0 16px"}}>← {t?t("back"):"Voltar"}</span>
      <h1>{t?t("messages"):"Mensagens"}</h1>
      {threads.length===0
        ? <p className="empty">{t?t("noConversations"):"—"}</p>
        : <div className="msg-wrap">
            <div className="msg-list">
              {threads.map(th=>(
                <div key={th.key} className={"thread"+(active&&th.key===active.key?" on":"")} onClick={()=>onSelect(th.key)}>
                  <h4>{other(th)}</h4><p>{th.courseTitle}</p>
                  <p>{th.messages.length? th.messages[th.messages.length-1].text : "—"}</p>
                </div>))}
            </div>
            <div className="msg-panel">
              <div className="msg-head">{active? `${other(active)} · ${active.courseTitle}` : ""}</div>
              <div className="msg-body">
                {active && active.messages.length===0 && <p style={{color:"#6a6f73",textAlign:"center"}}>{t?t("firstMessage"):""}</p>}
                {active && active.messages.map((m,i)=>
                  <div key={i} className={"bubble "+(m.from===user.email?"me":"them")}>{m.text}</div>)}
              </div>
              <div className="msg-input">
                <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={t?t("writeMessage"):"..."}/>
                <button onClick={send}>{t?t("send"):"Enviar"}</button>
              </div>
            </div>
          </div>}
    </div>
  );
}

          <p style={{color:"#3e4143"}}>Esta área é restrita a administradores. Faça login com uma conta de administrador para acessar.</p>

  const students=users.filter(u=>u.role==="student");
  const instructors=users.filter(u=>u.role==="instructor"||u.role==="admin");
  const exportCSV=(rows,headers,filename)=>{
    const esc=v=>{ const s=(v==null?"":String(v)).replace(/"/g,'""'); return /[",\n;]/.test(s)?`"${s}"`:s; };
    const lines=[headers.map(h=>esc(h.label)).join(",")];
    rows.forEach(r=>lines.push(headers.map(h=>esc(r[h.key])).join(",")));
    const csv="\uFEFF"+lines.join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };
  const exportStudents=()=>exportCSV(students,
    [{key:"name",label:"Nome"},{key:"email",label:"Email"},{key:"phone",label:"Telefone"},{key:"city",label:"Cidade"},{key:"community",label:"Comunidade"},{key:"gender",label:"Gênero"},{key:"isJewish",label:"Judeu"},{key:"blocked",label:"Bloqueado"}],

    [{key:"name",label:"Nome"},{key:"email",label:"Email"},{key:"role",label:"Tipo"},{key:"phone",label:"Telefone"},{key:"blocked",label:"Bloqueado"}],
    "instrutores_jewdemy.csv");

        <div className="admin-group">
          <span className="admin-group-label">Usuários</span>
          <button className={tab==="students"?"on":""} onClick={()=>setTab("students")}>Alunos</button>
          <button className={tab==="instructors"?"on":""} onClick={()=>setTab("instructors")}>Instrutores / Admin</button>
          <button className={tab==="requests"?"on":""} onClick={()=>setTab("requests")}>Pedidos de instrutor</button>
        </div>
        <div className="admin-group">
          <span className="admin-group-label">E-mails</span>
          <button className={tab==="emails"?"on":""} onClick={()=>setTab("emails")}>Modelos</button>
          <button className={tab==="batch"?"on":""} onClick={()=>setTab("batch")}>Enviar</button>
          <button className={tab==="log"?"on":""} onClick={()=>setTab("log")}>Enviados</button>
        </div>
        <div className="admin-group">
          <span className="admin-group-label">Design</span>
          <button className={tab==="design"?"on":""} onClick={()=>setTab("design")}>Design Site</button>
          <button className={tab==="footer"?"on":""} onClick={()=>setTab("footer")}>Rodapé</button>
          <button className={tab==="help"?"on":""} onClick={()=>setTab("help")}>Central de ajuda</button>
        </div>
      </div>

      {tab==="cats" &&
        <div className="form-card">
          <h2 style={{fontSize:18,marginBottom:14}}>Gerenciar categorias</h2>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input style={{flex:1,padding:11,border:"1px solid var(--ink)",borderRadius:4}} placeholder="Nova categoria" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){addCategory(newCat.trim());setNewCat("");}}}/>
            <button className="btn-primary" onClick={()=>{addCategory(newCat.trim());setNewCat("");}}>Adicionar</button>
          </div>
          <div>{categories.map((c,i)=>(
            <div key={c} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",border:"1px solid var(--line)",borderRadius:6,marginBottom:6}}>
              <span style={{flex:1,fontWeight:600}}>{c}</span>

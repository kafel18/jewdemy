function HelpEditor({content,onSave}){
  const [intro,setIntro]=useState((content&&content.intro)||"");
  const [faqs,setFaqs]=useState((content&&Array.isArray(content.faqs))?content.faqs.map(f=>({...f})):[]);
  const setFaq=(i,k,v)=>setFaqs(fs=>fs.map((f,j)=>j===i?{...f,[k]:v}:f));
  const addFaq=()=>setFaqs(fs=>[...fs,{q:"",a:""}]);
  const removeFaq=(i)=>setFaqs(fs=>fs.filter((_,j)=>j!==i));
  const moveFaq=(i,dir)=>setFaqs(fs=>{ const a=[...fs]; const j=i+dir; if(j<0||j>=a.length)return a; [a[i],a[j]]=[a[j],a[i]]; return a; });
  const save=()=>onSave({ intro, faqs: faqs.filter(f=>f.q.trim()||f.a.trim()) });
  return (
    <div style={{maxWidth:760}}>
      <h2 style={{fontSize:18,marginBottom:12}}>Central de ajuda</h2>
      <div className="field">
        <label>Texto de introdução</label>
        <textarea rows="2" value={intro} onChange={e=>setIntro(e.target.value)} placeholder="Encontre respostas rápidas ou envie sua dúvida."></textarea>
      </div>
      <h3 style={{fontSize:15,margin:"16px 0 8px"}}>Perguntas e respostas</h3>
      {faqs.map((f,i)=>(
        <div key={i} style={{border:"1px solid var(--line)",borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <strong style={{fontSize:13,color:"#6a6f73"}}>Pergunta {i+1}</strong>
            <div style={{display:"flex",gap:6}}>
              <button className="btn-ghost" onClick={()=>moveFaq(i,-1)} title="Subir">↑</button>
              <button className="btn-ghost" onClick={()=>moveFaq(i,1)} title="Descer">↓</button>
              <button className="btn-danger" onClick={()=>removeFaq(i)}>Remover</button>
            </div>
          </div>
          <div className="field"><label>Pergunta</label><input value={f.q} onChange={e=>setFaq(i,"q",e.target.value)}/></div>
          <div className="field"><label>Resposta</label><textarea rows="3" value={f.a} onChange={e=>setFaq(i,"a",e.target.value)}></textarea></div>
        </div>
      ))}
      <button className="btn-ghost" onClick={addFaq}>+ Adicionar pergunta</button>
      <div style={{marginTop:18}}><button className="btn-primary" onClick={save}>Salvar central de ajuda</button></div>
    </div>
  );
}

function FooterEditor({columns,setColumns}){
  const update=(next)=>setColumns(next.map(c=>({...c,links:[...c.links]})));
  const setColHeading=(ci,v)=>{ const n=columns.map((c,i)=>i===ci?{...c,heading:v}:c); update(n); };
  const setLink=(ci,li,patch)=>{ const n=columns.map((c,i)=>i!==ci?c:{...c,links:c.links.map((l,j)=>j===li?{...l,...patch}:l)}); update(n); };
  const addLink=(ci)=>{ const id=Date.now(); const n=columns.map((c,i)=>i===ci?{...c,links:[...c.links,{id,label:"Novo link",type:"page",content:""}]}:c); update(n); };
  const removeLink=(ci,li)=>{ const n=columns.map((c,i)=>i===ci?{...c,links:c.links.filter((_,j)=>j!==li)}:c); update(n); };
  const addColumn=()=>update([...columns,{id:Date.now(),heading:"Nova coluna",links:[]}]);
  const removeColumn=(ci)=>update(columns.filter((_,i)=>i!==ci));
  return (
    <div>
      <p style={{color:"#6a6f73",marginBottom:14,fontSize:14}}>Edite as colunas e os links do rodapé. Links do tipo “Página” abrem uma página própria com o conteúdo que você escrever (ex.: Política de privacidade). Os tipos Catálogo, Instrutor e Administração levam às respectivas áreas.</p>
      {columns.map((col,ci)=>(
        <div className="form-card" key={col.id}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <input style={{flex:1,padding:10,border:"1px solid var(--ink)",borderRadius:4,fontWeight:700}} value={col.heading} onChange={e=>setColHeading(ci,e.target.value)}/>
            <button className="btn-danger" onClick={()=>removeColumn(ci)}>Remover coluna</button>
          </div>
          {col.links.map((link,li)=>(
            <div className="lesson-edit" key={link.id}>
              <div className="row" style={{display:"flex",gap:8,alignItems:"center"}}>
                <input style={{flex:1}} placeholder="Texto do link" value={link.label} onChange={e=>setLink(ci,li,{label:e.target.value})}/>
                <select value={link.type} onChange={e=>setLink(ci,li,{type:e.target.value})}>
                  <option value="page">Página própria</option>
                  <option value="catalog">Catálogo</option>
                  <option value="instrutor">Área do instrutor</option>
                  <option value="admin">Administração</option>
                </select>
                <button className="btn-danger" onClick={()=>removeLink(ci,li)}>×</button>
              </div>
              {link.type==="page" &&
                <div style={{marginTop:8}}>
                  <label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:4}}>Conteúdo da página</label>
                  <textarea rows="3" style={{width:"100%",padding:9,border:"1px solid var(--line)",borderRadius:4}} value={link.content} onChange={e=>setLink(ci,li,{content:e.target.value})}></textarea>
                </div>}
            </div>
          ))}
          <button className="btn-ghost" onClick={()=>addLink(ci)}>+ Adicionar link</button>
        </div>
      ))}
      <button className="btn-primary" onClick={addColumn}>+ Adicionar coluna</button>
    </div>
  );
}

function NewTemplate({onAdd}){
  const [label,setLabel]=useState(""); const [subject,setSubject]=useState(""); const [body,setBody]=useState("");
  return (
    <div className="form-card" style={{borderStyle:"dashed"}}>
      <h2 style={{fontSize:16,marginBottom:12}}>+ Criar novo modelo de e-mail</h2>
      <div className="field"><label>Nome do modelo</label><input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Ex: Promoção, Lembrete..."/></div>
      <div className="field"><label>Assunto</label><input value={subject} onChange={e=>setSubject(e.target.value)}/></div>
      <div className="field"><label>Corpo <span className="hint">(use {"{nome}"})</span></label>
        <textarea rows="3" value={body} onChange={e=>setBody(e.target.value)}></textarea></div>
      <button className="btn-primary" onClick={()=>{ if(!label.trim()||!subject.trim()||!body.trim()){alert("Preencha todos os campos");return;} onAdd(label,subject,body); setLabel("");setSubject("");setBody(""); }}>Adicionar modelo</button>
    </div>
  );
}

function BatchEmail({onBatch,emailTemplates}){
  const [recipients,setRecipients]=useState("all");

  const pick=(key)=>{
    setChosen(key);
    if(key==="free"){ setSubject(""); setBody(""); }
    else { const tpl=emailTemplates[key]; if(tpl){ setSubject(tpl.subject); setBody(tpl.body); } }
  };
  const tplLabel=(key,tpl)=> key==="welcome"?"Boas-vindas":key==="enroll"?"Inscrição em curso":(tpl.label||key);
  return (
    <div className="form-card">
      <h2 style={{fontSize:18,marginBottom:14}}>Criar e enviar e-mail em massa</h2>
      <div className="field"><label>Conteúdo</label>
        <select value={chosen} onChange={e=>pick(e.target.value)}>
          <option value="free">Texto livre</option>
          {Object.entries(emailTemplates).map(([key,tpl])=><option key={key} value={key}>Modelo: {tplLabel(key,tpl)}</option>)}
        </select></div>
      <div className="field"><label>Destinatários</label>
        <select value={recipients} onChange={e=>setRecipients(e.target.value)}>
          <option value="all">Todos os usuários</option>
          <option value="students">Apenas alunos</option>
          <option value="instructors">Apenas instrutores</option>
        </select></div>
      <div className="field"><label>Assunto</label><input value={subject} onChange={e=>setSubject(e.target.value)}/></div>
      <div className="field"><label>Mensagem <span className="hint">(use {"{nome}"} para personalizar)</span></label>
        <textarea rows="5" value={body} onChange={e=>setBody(e.target.value)}></textarea></div>
      <button className="btn-primary" onClick={()=>{ if(!subject.trim()||!body.trim()){alert("Preencha assunto e mensagem");return;} onBatch(recipients,subject,body); setSubject("");setBody("");setChosen("free"); }}>Enviar e-mail</button>
    </div>
  );
}

function CreateUserModal({onClose,onCreate,t}){
  const [name,setName]=useState(""); const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [phone,setPhone]=useState(""); const [role,setRole]=useState("instructor");
  const submit=async()=>{
    if(!name.trim()||!email.trim()||!pw.trim()){alert("Preencha nome, email e senha");return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert(t("errEmail"));return;}
    if(pw.length<6){alert(t("errPassword"));return;}
    const ok=await onCreate({name,email,password:pw,phone:phone.replace(/[^\d]/g,""),role,city:"",community:"",isJewish:null});
    if(ok!==false) onClose();
  };
  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <button className="close-x" style={{position:"absolute",top:12,right:16}} onClick={onClose}>×</button>
        <h2>Criar conta</h2>
        <div className="role-pick">
          <button className={role==="instructor"?"sel":""} onClick={()=>setRole("instructor")}>Instrutor</button>
          <button className={role==="admin"?"sel":""} onClick={()=>setRole("admin")}>Administrador</button>
        </div>
        <div className="field"><label>{t("name")}</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="field"><label>{t("emailLbl")}</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        <div className="field"><label>{t("phone")}</label><input type="tel" inputMode="numeric" value={phone} onChange={e=>setPhone(e.target.value)}/></div>
        <div className="field"><label>{t("passwordLbl")}</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)}/></div>
        <button className="submit" onClick={submit}>Criar conta</button>
      </div>
    </div>
  );
}

function EditModal({target,categories,t,lang,onClose,onSave}){
  const isUser=target.type==="user";
  const d=target.data;
  const [f,setF]=useState(isUser
    ? {name:d.name,email:d.email,phone:d.phone||"",city:d.city||"",community:d.community||"",role:d.role,password:d.password||"",gender:d.gender||"",isJewish:(d.isJewish===true?"yes":d.isJewish===false?"no":"")}
    : {title:d.title,author:d.author,cat:d.cat,level:d.level,lang:d.lang,price:String(d.price),old:String(d.old),desc:d.desc});
  const set=(k,v)=>setF({...f,[k]:v});
  const emailOk=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const save=()=>{
    if(isUser){ if(!emailOk(f.email)){alert(t("errEmail"));return;} if(f.phone && f.phone.replace(/[^\d]/g,"").length<8){alert(t("errPhone"));return;} onSave({name:f.name,email:f.email,phone:f.phone.replace(/[^\d]/g,""),city:f.city,community:f.community,role:f.role,password:f.password,gender:f.gender||null,isJewish:f.isJewish==="yes"?true:f.isJewish==="no"?false:null}); }
    else { if(isNaN(parseFloat(f.price))){alert(t("errRequired"));return;} onSave({title:f.title,author:f.author,cat:f.cat,level:f.level,lang:f.lang,price:parseFloat(f.price)||0,old:parseFloat(f.old)||0,desc:f.desc}); }
  };
  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <button className="close-x" style={{position:"absolute",top:12,right:16}} onClick={onClose}>×</button>
        <h2>{isUser?"Editar usuário":"Editar curso"}</h2>
        {isUser ? <>
          <div className="field"><label>Nome</label><input value={f.name} onChange={e=>set("name",e.target.value)}/></div>
          <div className="field"><label>Email</label><input value={f.email} onChange={e=>set("email",e.target.value)}/></div>
          <div className="field"><label>{t("passwordLbl")}</label><input value={f.password} onChange={e=>set("password",e.target.value)} placeholder="(senha)"/></div>
          <div className="field"><label>Telefone</label><input type="tel" inputMode="numeric" value={f.phone} onChange={e=>set("phone",e.target.value)}/></div>
          <div className="field"><label>Cidade</label><input value={f.city} onChange={e=>set("city",e.target.value)}/></div>
          <div className="field"><label>Comunidade</label><input value={f.community} onChange={e=>set("community",e.target.value)}/></div>
          <div style={{display:"flex",gap:10}}>
            <div className="field" style={{flex:1}}><label>{t("gender")}</label>
              <select value={f.gender} onChange={e=>set("gender",e.target.value)}><option value="">—</option><option value="male">{t("male")}</option><option value="female">{t("female")}</option></select></div>
            <div className="field" style={{flex:1}}><label>{t("areYouJewish")}</label>
              <select value={f.isJewish} onChange={e=>set("isJewish",e.target.value)}><option value="">—</option><option value="yes">{t("yes")}</option><option value="no">{t("no")}</option></select></div>
          </div>
          <div className="field"><label>Tipo</label>
            <select value={f.role} onChange={e=>set("role",e.target.value)}><option value="student">Aluno</option><option value="instructor">Instrutor</option><option value="admin">Administrador</option></select></div>
        </> : <>
          <div className="field"><label>{t("title")}</label><input value={f.title} onChange={e=>set("title",e.target.value)}/></div>
          <div className="field"><label>Autor</label><input value={f.author} onChange={e=>set("author",e.target.value)}/></div>
          <div className="field"><label>Categoria</label>
            <select value={f.cat} onChange={e=>set("cat",e.target.value)}>{categories.map(c=><option key={c} value={c}>{catLabel(c,lang)}</option>)}</select></div>
          <div style={{display:"flex",gap:10}}>
            <div className="field" style={{flex:1}}><label>Nível</label>
              <select value={f.level} onChange={e=>set("level",e.target.value)}>{LEVELS.map(l=><option key={l} value={l}>{t(l)}</option>)}</select></div>
            <div className="field" style={{flex:1}}><label>Idioma</label>
              <select value={f.lang} onChange={e=>set("lang",e.target.value)}>{COURSE_LANGS.map(l=><option key={l}>{l}</option>)}</select></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div className="field" style={{flex:1}}><label>Preço</label><input value={f.price} onChange={e=>set("price",e.target.value)}/></div>
            <div className="field" style={{flex:1}}><label>Preço antigo</label><input value={f.old} onChange={e=>set("old",e.target.value)}/></div>
          </div>
          <div className="field"><label>{t("description")}</label><textarea rows="3" value={f.desc} onChange={e=>set("desc",e.target.value)}></textarea></div>
        </>}
        <button className="submit" onClick={save}>Salvar</button>
      </div>
    </div>
  );
}

function ComposeModal({title,to,message,onClose,onSend}){
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <button className="close-x" style={{position:"absolute",top:12,right:16}} onClick={onClose}>×</button>
        <h2>{title}</h2>
        {to && <p style={{fontSize:13,color:"#6a6f73",marginBottom:12,textAlign:"center"}}>Para: {to}</p>}
        {!message &&
          <div className="field"><label>Assunto</label><input value={subject} onChange={e=>setSubject(e.target.value)}/></div>}
        <div className="field"><label>{message?"Mensagem":"Corpo"}</label>
          <textarea rows="5" value={body} onChange={e=>setBody(e.target.value)}></textarea></div>
        <button className="submit" onClick={()=>{ if(!body.trim()||(!message&&!subject.trim())){alert("Preencha os campos");return;} onSend(subject,body); }}>Enviar</button>
      </div>
    </div>
  );
}

// ============ CART ============
function CartDrawer({cart,t,total,onClose,onRemove,onCheckout}){
  return (<>
    <div className="overlay" onClick={onClose}></div>
    <div className="drawer">
      <header><strong>{t("cart")} ({cart.length})</strong><button className="close-x" onClick={onClose}>×</button></header>
      <div className="items">
        {cart.length===0? <p className="empty">{t("empty")}</p> :
          cart.map(co=>(
            <div className="cart-row" key={co.id}>
              <div className="mini" style={{background:COLORS[co.id%COLORS.length]}}>{co.title[0]}</div>
              <div className="info"><h4>{co.title}</h4><div className="author">{co.author}</div><button className="remove" onClick={()=>onRemove(co.id)}>{t("remove")}</button></div>
              <div style={{fontWeight:800}}>R$ {co.price.toFixed(2)}</div>
            </div>))}
      </div>
      {cart.length>0 &&
        <div className="foot">
          <div className="total"><span>{t("total")}:</span><span>R$ {total.toFixed(2)}</span></div>
          <button onClick={onCheckout}>{t("checkout")}</button>
        </div>}
    </div>
  </>);
}

// ============ AUTH (inscrição só de aluno; Google só no login) ============
function Auth({t,onClose,onRegister,onLogin,onGoogle,onRecover}){
  const [mode,setMode]=useState("login"); // login | signup | recover
  const [name,setName]=useState(""); const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [phone,setPhone]=useState(""); const [city,setCity]=useState(""); const [community,setCommunity]=useState(""); const [isJewish,setIsJewish]=useState(null); const [gender,setGender]=useState(null);
  const [err,setErr]=useState("");

  const emailOk=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const phoneClean=v=>v.replace(/[^\d]/g,"");

  const submit=async()=>{
    setErr("");
    if(mode==="recover"){
      if(!emailOk(email)){ setErr(t("errEmail")); return; }
      if(await onRecover(email)!==false){ setMode("login"); setPw(""); }
      return;
    }
    if(mode==="login"){
      if(!emailOk(email)){ setErr(t("errEmail")); return; }
      if(!pw){ setErr(t("errRequired")); return; }
      await onLogin(email,pw); return;
    }
    // signup
    if(!name.trim()){ setErr(t("errRequired")); return; }
    if(!emailOk(email)){ setErr(t("errEmail")); return; }
    if(pw.length<6){ setErr(t("errPassword")); return; }
    const ph=phoneClean(phone);
    if(ph.length<8){ setErr(t("errPhone")); return; }
    if(!city.trim()||!community.trim()){ setErr(t("errRequired")); return; }
    if(gender===null){ setErr(t("gender")); return; }
    if(isJewish===null){ setErr(t("areYouJewish")); return; }
    await onRegister({name,email,password:pw,role:"student",phone:ph,city,community,isJewish,gender});
  };

  return (
    <div className="modal">
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <button className="close-x" style={{position:"absolute",top:12,right:16}} onClick={onClose}>×</button>
        <h2>{mode==="login"?t("loginTitle"):mode==="recover"?t("recoverTitle"):t("signupTitle")}</h2>

        {mode==="login" && <>
          <button className="gbtn" onClick={()=>onGoogle()}>
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.2 13.3 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.2-3.9 6.2-9.6 6.2-16.9z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.4-.8-2.9-.8-4.3s.3-2.9.8-4.3l-7.9-6.1C.9 16.6 0 20.2 0 24s.9 7.4 2.5 10.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.6 2.1-7.9 2.1-6.4 0-11.8-3.8-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
            {t("googleLogin")}
          </button>
          <div className="divider">{t("orEmail")}</div>
        </>}

        {mode==="recover" &&
          <p style={{fontSize:13,color:"#6a6f73",marginBottom:12}}>{t("recoverIntro")}</p>}

        {mode==="signup" &&
          <div className="field"><label>{t("name")}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t("name")}/></div>}

        <div className="field"><label>{t("emailLbl")}</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}} placeholder="voce@email.com"/></div>

        {mode!=="recover" &&
          <div className="field"><label>{t("passwordLbl")}</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}} placeholder="••••••••"/></div>}

        {mode==="signup" && <>
          <div className="field"><label>{t("phone")}</label><input type="tel" inputMode="numeric" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(00) 00000-0000"/></div>
          <div className="field"><label>{t("cityLbl")}</label><input value={city} onChange={e=>setCity(e.target.value)} placeholder="Ex: São Paulo"/></div>
          <div className="field"><label>{t("communityLbl")}</label><input value={community} onChange={e=>setCommunity(e.target.value)} placeholder="Ex: Sinagoga / comunidade local"/></div>
          <div className="field"><label>{t("gender")}</label>
            <div className="yesno">
              <button className={gender==="male"?"sel":""} onClick={()=>setGender("male")}>{t("male")}</button>
              <button className={gender==="female"?"sel":""} onClick={()=>setGender("female")}>{t("female")}</button>
            </div>
          </div>
          <div className="field"><label>{t("areYouJewish")}</label>
            <div className="yesno">
              <button className={isJewish===true?"sel":""} onClick={()=>setIsJewish(true)}>{t("yes")}</button>
              <button className={isJewish===false?"sel":""} onClick={()=>setIsJewish(false)}>{t("no")}</button>
            </div>
          </div>
        </>}

        {err && <p style={{color:"var(--red)",fontSize:13,margin:"4px 0 10px",fontWeight:600}}>{err}</p>}

        <button className="submit" onClick={submit}>{mode==="login"?t("login"):mode==="recover"?t("recoverSubmit"):t("createAccount")}</button>

        {mode==="login" &&
          <div style={{textAlign:"center",marginTop:10}}><b style={{color:"var(--purple)",cursor:"pointer",fontSize:13}} onClick={()=>{setErr("");setMode("recover");}}>{t("forgotPassword")}</b></div>}

        <div className="switch">
          {mode==="signup"
            ? <>{t("haveAccount")} <b onClick={()=>{setErr("");setMode("login");}}>{t("loginLink")}</b></>
            : mode==="recover"
              ? <><b onClick={()=>{setErr("");setMode("login");}}>← {t("loginLink")}</b></>
              : <>{t("noAccount")} <b onClick={()=>{setErr("");setMode("signup");}}>{t("signupLink")}</b></>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
